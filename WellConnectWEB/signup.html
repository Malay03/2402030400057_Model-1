<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WellConnect — Sign Up</title>
  <meta name="description" content="Create your free WellConnect account. Find top-rated doctors and book appointments instantly." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@400;500&family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-body">

  <!-- ===== NAVBAR ===== -->
  <header class="navbar navbar--auth" id="navbar">
    <a href="index.html" class="navbar__logo">WellConnect</a>

    <nav class="navbar__links" id="navLinks">
      <a href="index.html#hero">Home</a>
      <a href="index.html#why">Find a Doctor</a>
      <a href="index.html#pricing">Plans</a>
      <a href="index.html#cta">Contact us</a>
    </nav>

    <button class="hamburger" id="hamburger" aria-label="Toggle navigation menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html#hero">Home</a>
    <a href="index.html#why">Find a Doctor</a>
    <a href="index.html#pricing">Plans</a>
    <a href="index.html#cta">Contact us</a>
  </div>

  <!-- ===== AUTH PAGE CONTENT ===== -->
  <main class="auth-page">
    <!-- Left decorative side -->
    <div class="auth-left">
      <div class="auth-left__decor">
        <div class="auth-left__card"></div>
        <div class="auth-left__circle"></div>
      </div>
      <div class="auth-left__text">
        <h2 class="auth-left__heading">Book Appointments<br/>instantly</h2>
        <p class="auth-left__subtitle">Find top-rated doctors<br/>near you and book under<br/>60 seconds</p>
      </div>
      <div class="auth-left__dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot active"></span>
      </div>
    </div>

    <!-- Right form side -->
    <div class="auth-right">
      <div class="auth-form-container">
        <!-- Sign up / Log in Toggle -->
        <div class="auth-toggle" id="authToggle">
          <div class="auth-toggle__slider" id="authSlider"></div>
          <button class="auth-toggle__btn active" id="authSignupBtn" data-tab="signup">Sign up</button>
          <button class="auth-toggle__btn" id="authLoginBtn" data-tab="login">Log in</button>
        </div>

        <!-- Sign Up Form -->
        <form class="auth-form" id="signupForm">
          <div class="auth-form__row">
            <div class="auth-form__field">
              <input type="text" id="firstName" placeholder="First Name" required />
            </div>
            <div class="auth-form__field">
              <input type="text" id="lastName" placeholder="Last Name" required />
            </div>
          </div>
          <div class="auth-form__field">
            <input type="tel" id="contact" placeholder="Contact (Optional)" />
          </div>
          <div class="auth-form__field">
            <input type="email" id="signupEmail" placeholder="Email" required />
          </div>
          <div class="auth-form__field">
            <input type="password" id="signupPassword" placeholder="Password" required />
          </div>
          <div class="auth-form__field">
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required />
          </div>
          <button type="submit" class="auth-form__submit" id="btnNext">Next</button>
          <button type="button" class="auth-form__google" id="btnGoogleSignup">
            <svg class="google-icon" viewBox="0 0 24 24" width="22" height="22">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span>Google Sign up</span>
          </button>
        </form>

        <!-- Log In Form (hidden by default) -->
        <form class="auth-form auth-form--hidden" id="loginForm">
          <div class="auth-form__field">
            <input type="email" id="loginEmail" placeholder="Email" required />
          </div>
          <div class="auth-form__field">
            <input type="password" id="loginPassword" placeholder="Password" required />
          </div>
          <button type="submit" class="auth-form__submit" id="btnLoginSubmit">Log in</button>
          <button type="button" class="auth-form__google" id="btnGoogleLogin">
            <svg class="google-icon" viewBox="0 0 24 24" width="22" height="22">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span>Google Log in</span>
          </button>
        </form>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
