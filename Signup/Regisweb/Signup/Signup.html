<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="Signup.css">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <h1>Registration Form</h1>
            <form id="registrationForm" method="POST" enctype="multipart/form-data">
                
                <!-- First Name -->
                <div class="form-group">
                    <label for="firstName">First Name <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="firstName" 
                        name="firstName" 
                        placeholder="Enter your first name"
                        required
                    >
                    <span class="error-message" id="firstNameError"></span>
                </div>

                <!-- Last Name -->
                <div class="form-group">
                    <label for="lastName">Last Name <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="lastName" 
                        name="lastName" 
                        placeholder="Enter your last name"
                        required
                    >
                    <span class="error-message" id="lastNameError"></span>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email"
                        required
                    >
                    <span class="error-message" id="emailError"></span>
                </div>

                <!-- Contact -->
                <div class="form-group">
                    <label for="contact">Contact Number <span class="required">*</span></label>
                    <input 
                        type="tel" 
                        id="contact" 
                        name="contact" 
                        placeholder="Enter your contact number"
                        required
                    >
                    <span class="error-message" id="contactError"></span>
                </div>

                <!-- Gender -->
                <div class="form-group">
                    <label for="gender">Gender <span class="required">*</span></label>
                    <select id="gender" name="gender" required>
                        <option value="">-- Select Gender --</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                        <option value="prefer-not-to-say">Prefer not to say</option>
                    </select>
                    <span class="error-message" id="genderError"></span>
                </div>

                <!-- Date of Birth -->
                <div class="form-group">
                    <label for="dateOfBirth">Date of Birth <span class="required">*</span></label>
                    <input 
                        type="date" 
                        id="dateOfBirth" 
                        name="dateOfBirth"
                        required
                    >
                    <span class="error-message" id="dateError"></span>
                </div>

                <!-- City -->
                <div class="form-group">
                    <label for="city">City <span class="required">*</span></label>
                    <select id="city" name="city" required>
                        <option value="">-- Select City --</option>
                        <option value="delhi">Delhi</option>
                        <option value="mumbai">Mumbai</option>
                        <option value="bangalore">Bangalore</option>
                        <option value="hyderabad">Hyderabad</option>
                        <option value="pune">Pune</option>
                        <option value="ahmedabad">Ahmedabad</option>
                        <option value="jaipur">Jaipur</option>
                        <option value="lucknow">Lucknow</option>
                        <option value="kolkata">Kolkata</option>
                        <option value="chennai">Chennai</option>
                        <option value="other">Other</option>
                    </select>
                    <span class="error-message" id="cityError"></span>
                </div>

                <!-- State -->
                <div class="form-group">
                    <label for="state">State <span class="required">*</span></label>
                    <select id="state" name="state" required>
                        <option value="">-- Select State --</option>
                        <option value="delhi">Delhi</option>
                        <option value="maharashtra">Maharashtra</option>
                        <option value="karnataka">Karnataka</option>
                        <option value="telangana">Telangana</option>
                        <option value="maharashtra">Maharashtra</option>
                        <option value="gujarat">Gujarat</option>
                        <option value="rajasthan">Rajasthan</option>
                        <option value="uttar-pradesh">Uttar Pradesh</option>
                        <option value="west-bengal">West Bengal</option>
                        <option value="tamil-nadu">Tamil Nadu</option>
                        <option value="other">Other</option>
                    </select>
                    <span class="error-message" id="stateError"></span>
                </div>

                <!-- File Upload -->
                <div class="form-group">
                    <label for="fileUpload">Upload Document <span class="required">*</span></label>
                    <div class="file-upload-wrapper">
                        <input 
                            type="file" 
                            id="fileUpload" 
                            name="fileUpload"
                            accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.txt"
                            required
                        >
                        <span class="file-size-info">(Max 10 MB)</span>
                    </div>
                    <span class="error-message" id="fileError"></span>
                    <span class="success-message" id="fileSuccess"></span>
                </div>

                <!-- Submit Button -->
                <div class="form-group button-group">
                    <button type="submit" class="btn-submit">Submit</button>
                    <button type="reset" class="btn-reset">Clear</button>
                </div>
            </form>
        </div>
    </div>

    <script src="Signup.js"></script>
</body>
</html>
