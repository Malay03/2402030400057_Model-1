<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flex and Grid Layout Example</title>
  <link rel="stylesheet" href="flex-grid-layout.css" />
</head>
<body>
  <header>
    <h1>Flexbox and Grid Layout</h1>
    <p>Two layout examples using CSS Flexbox and CSS Grid.</p>
  </header>

  <section class="example-section">
    <h2>Flexbox Layout</h2>
    <div class="flex-container">
      <div class="card">Flex item 1</div>
      <div class="card">Flex item 2</div>
      <div class="card">Flex item 3</div>
      <div class="card">Flex item 4</div>
    </div>
  </section>

  <section class="example-section">
    <h2>Grid Layout</h2>
    <div class="grid-container">
      <div class="grid-item item-a">Header</div>
      <div class="grid-item item-b">Sidebar</div>
      <div class="grid-item item-c">Main</div>
      <div class="grid-item item-d">Extra</div>
      <div class="grid-item item-e">Footer</div>
    </div>
  </section>
</body>
</html>
