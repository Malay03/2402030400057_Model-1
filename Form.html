<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 18px rgba(0, 0, 0, 0.12);
            width: 420px;
        }
        .top-banner {
            text-align: center;
            margin-bottom: 18px;
        }
        .logo {
            display: block;
            margin: 0 auto 10px;
            max-width: 120px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        marquee {
            display: block;
            margin-bottom: 15px;
            color: #1a237e;
            font-weight: 600;
        }
        marquee a {
            color: #0d47a1;
            text-decoration: none;
        }
        marquee a:hover {
            text-decoration: underline;
        }
        .video-wrapper {
            margin: 0 auto 20px;
            max-width: 100%;
        }
        video {
            width: 100%;
            border-radius: 10px;
            background-color: #000;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 5px;
            color: #555;
        }
        input[type="text"], input[type="email"], input[type="password"], input[type="tel"], textarea, select {
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        input[type="radio"], input[type="checkbox"] {
            margin-right: 5px;
        }
        .radio-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .checkbox-group {
            margin-bottom: 15px;
        }
        .checkbox-group label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        input[type="submit"]:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-banner">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQBl4hQ0bneniNDPiCIR5pfs4e-n6plKsKHVw&s" alt="Logo" class="logo">
            <marquee behavior="scroll" direction="left">Welcome to our registration page! <a href="https://example.com" target="_blank">Click here to learn more</a></marquee>
            <div class="video-wrapper">
                <video controls>
                    <source src="file:///F:/1%20Edits%20pr/ShacksnScroll/12%20Sanira%20Villa%20reel%203/audio/Spend%20quality%20time%20in%20a%20cozy%20and%20peaceful%20villa%20720P.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
        </div>
        <h1>Registration Form</h1>
        
        <form>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" required><br><br>
            <iframe src="https://techzaiduu.blogspot.com/2024/11/measure-current-with-arduino-and.html?m=1" width="100%" height="100%" frameBorder="0" class="giphy-embed" allowFullScreen></iframe>

            Email:
            <input type="email" id="email" name="email" required><br><br>

            Password:
            <input type="password" id="password" name="password" required><br><br>

            Gender:<br>
            <div class="radio-group">
                <label><input type="radio" id="male" name="gender" value="male" required> Male</label>
                <label><input type="radio" id="female" name="gender" value="female" required> Female</label>
            </div>

            Hobbies:<br>
            <div class="checkbox-group">
                <label><input type="checkbox" id="hobby1" name="hobbies" value="reading"> Reading</label>
                <label><input type="checkbox" id="hobby2" name="hobbies" value="writing"> Writing</label>
                <label><input type="checkbox" id="hobby3" name="hobbies" value="swimming"> Swimming</label>
            </div>

            Contact Number:
            <input type="tel" id="contact" name="contact" required><br><br>

            Address:
            <textarea id="address" name="address" rows="4" cols="50" required></textarea><br><br>

            State:
            <select id="state" name="state" required>
                <option value="">Select State</option>
                <option value="state1">Gujarat</option>
                <option value="state2">Maharashtra</option>
                <option value="state3">Rajasthan</option>
                <option value="state4">Punjab</option>
                <option value="state5">Haryana</option>
            </select><br><br>

            <input type="submit" value="Register">
        </form>
    </div>
</body>
</html>
